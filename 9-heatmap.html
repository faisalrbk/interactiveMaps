<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title> heatmap </title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="gray-vector" zoom="2" center="-138, 30">
      <arcgis-legend slot="bottom-left"></arcgis-legend>
    </arcgis-map>
    <script type="module">
      const CSVLayer = await $arcgis.import("@arcgis/core/layers/CSVLayer.js");

      const url = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_week.csv";

      // Paste the url into a browser's address bar to download and view the attributes
      // in the CSV file. These attributes include:
      // * mag - magnitude
      // * type - earthquake or other event such as nuclear test
      // * place - location of the event
      // * time - the time of the event

      const template = {
        title: "{place}",
        content: "Magnitude {mag} {type} hit {place} on {time}.",
      };

      // The heatmap renderer assigns each pixel in the view with
      // an intensity value. The ratio of that intensity value
      // to the maxPixel intensity is used to assign a color
      // from the continuous color ramp in the colorStops property

      const renderer = {
        type: "heatmap",
        colorStops: [
          { color: "rgba(63, 40, 102, 0)", ratio: 0 },
          { color: "#472b77", ratio: 0.083 },
          { color: "#4e2d87", ratio: 0.166 },
          { color: "#563098", ratio: 0.249 },
          { color: "#5d32a8", ratio: 0.332 },
          { color: "#6735be", ratio: 0.415 },
          { color: "#7139d4", ratio: 0.498 },
          { color: "#7b3ce9", ratio: 0.581 },
          { color: "#853fff", ratio: 0.664 },
          { color: "#a46fbf", ratio: 0.747 },
          { color: "#c29f80", ratio: 0.83 },
          { color: "#e0cf40", ratio: 0.913 },
          { color: "#ffff00", ratio: 1 },
        ],
        maxDensity: 0.01,
        minDensity: 0,
      };

      const layer = new CSVLayer({
        url: url,
        title: "Magnitude 2.5+ earthquakes from the last week",
        copyright: "USGS Earthquakes",
        popupTemplate: template,
        renderer: renderer,
        labelsVisible: true,
        labelingInfo: [
          {
            symbol: {
              type: "text", // autocasts as new TextSymbol()
              color: "white",
              font: {
                family: "Noto Sans",
                size: 8,
              },
              haloColor: "#472b77",
              haloSize: 0.75,
            },
            labelPlacement: "center-center",
            labelExpressionInfo: {
              expression: "Text($feature.mag, '#.0')",
            },
            where: "mag > 5",
          },
        ],
      });

      const viewElement = document.querySelector("arcgis-map");
      await viewElement.viewOnReady();
      viewElement.map.add(layer);
    </script>
  </body>
</html>
